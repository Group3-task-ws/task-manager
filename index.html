<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Task Manager</h1>

<form onsubmit="handleSubmit(event)">
    <input type="text" id="title" placeholder="Task Title" required>
    <input type="text" id="description" placeholder="Description">

    <select id="category" required>
        <option value="">Category</option>
        <option value="Personal">Personal</option>
        <option value="Work">Work</option>
    </select>

    <select id="priority" required>
        <option value="">Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
    </select>

    <input type="date" id="dueDate" required>

    <button type="submit" id="submitBtn">Add Task</button>
</form>

<hr>

<!-- 🔥 FILTER SECTION -->
<div class="filters">
    <button onclick="setStatusFilter('all')">All</button>
    <button onclick="setStatusFilter('active')">Active</button>
    <button onclick="setStatusFilter('completed')">Completed</button>

    <select onchange="setPriorityFilter(this.value)">
        <option value="all">All Priority</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <input type="text" placeholder="Search..." oninput="setSearch(this.value)">
</div>

<div id="taskList"></div>

<script src="js/storage.js"></script>
<script src="js/tasks.js"></script>

</body>
</html>
